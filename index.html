<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Mode Selection Screen */
        .mode-selection {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .mode-selection h1 {
            color: #667eea;
            margin-bottom: 50px;
            font-size: 2.5em;
        }

        .mode-selection p {
            color: #666;
            margin-bottom: 50px;
            font-size: 1.1em;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        .mode-btn {
            padding: 40px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: white;
        }

        .mode-btn.vs-comp {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .mode-btn.vs-friend {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .mode-btn:active {
            transform: translateY(-2px);
        }

        /* Game Screen */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .game-header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .game-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .status-info {
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .score-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .score-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .score-card.active {
            border-color: #667eea;
            transform: scale(1.05);
        }

        .score-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .role {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .score-value {
            font-size: 3em;
            color: #764ba2;
            font-weight: bold;
        }

        .game-area {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .action-info {
            text-align: center;
            margin-bottom: 10px;
            color: #667eea;
            font-size: 1.1em;
            font-weight: 600;
        }

        .timer-info {
            text-align: center;
            margin-bottom: 25px;
            color: #444;
            font-size: 1em;
            font-weight: 700;
        }

        .choices-container {
            display: grid;
            grid-template-columns: repeat(6, minmax(80px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .choice-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 3px solid #e0e0e0;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 2.3em;
            font-weight: 700;
            color: #333;
            display: grid;
            place-items: center;
            position: relative;
        }

        .choice-btn::after {
            content: 'Run';
            position: absolute;
            bottom: 12px;
            font-size: 0.75em;
            color: #888;
            font-weight: 600;
        }

        .choice-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
            transform: scale(1.08);
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .choice-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
            transform: scale(1.15);
        }

        .choice-btn.selected .run-label {
            color: white;
        }

        .result-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .result-display {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 25px;
        }

        .batter-choice, .bowler-choice {
            font-size: 3.5em;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
        }

        .vs-text {
            font-size: 1.2em;
            color: #999;
            font-weight: 600;
        }

        .round-result {
            font-size: 1.5em;
            color: #764ba2;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 30px;
            padding: 15px;
            border-radius: 10px;
        }

        .round-result.out {
            color: white;
            background: #f44336;
        }

        .round-result.runs {
            color: #4caf50;
            background: #e8f5e9;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .game-over {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            display: none;
        }

        .game-over.active {
            display: block;
        }

        .game-over h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .game-over .btn-primary {
            background: white;
            color: #667eea;
            margin: 10px 5px;
        }

        @media (max-width: 600px) {
            .mode-buttons {
                grid-template-columns: 1fr;
            }

            .choices-container {
                grid-template-columns: repeat(3, 1fr);
            }

            .choice-btn {
                font-size: 1.8em;
                padding: 20px 10px;
            }

            .batter-choice, .bowler-choice {
                font-size: 2.5em;
            }

            .game-header h2 {
                font-size: 1.5em;
            }

            .score-value {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-selection" id="modeSelection">
            <h1>🏏 Hand Cricket</h1>
            <p>Choose a game mode</p>
            <div class="mode-buttons">
                <button class="mode-btn vs-comp" onclick="startGame('computer')">
                    🤖<br>vs Computer
                </button>
                <button class="mode-btn vs-friend" onclick="startGame('friend')">
                    👥<br>vs Friend
                </button>
            </div>
        </div>

        <div class="game-screen" id="gameScreen">
            <div class="game-header">
                <h2 id="gameTitle">Hand Cricket</h2>
                <div class="status-info" id="statusInfo">Loading...</div>
            </div>

            <div class="score-board">
                <div class="score-card" id="player1Card">
                    <h3 id="player1Name">You</h3>
                    <div class="role" id="player1Role">Batter</div>
                    <div class="score-value" id="player1Score">0</div>
                </div>
                <div class="score-card" id="player2Card">
                    <h3 id="player2Name">Computer</h3>
                    <div class="role" id="player2Role">Bowler</div>
                    <div class="score-value" id="player2Score">0</div>
                </div>
            </div>

            <div class="game-area">
                <div class="action-info" id="actionInfo">Choose your runs...</div>
            <div class="timer-info" id="timerInfo">Time left: 3s</div>

                <div class="choices-container">
                    <button class="choice-btn" onclick="selectRun(1, event)">☝️</button>
                    <button class="choice-btn" onclick="selectRun(2, event)">✌️</button>
                    <button class="choice-btn" onclick="selectRun(3, event)">🤟</button>
                    <button class="choice-btn" onclick="selectRun(4, event)">✋</button>
                    <button class="choice-btn" onclick="selectRun(5, event)">🖐️</button>
                    <button class="choice-btn" onclick="selectRun(6, event)">👍</button>
                </div>

                <div class="result-section">
                    <div class="result-display">
                        <div class="batter-choice" id="batterChoice">-</div>
                        <div class="vs-text">VS</div>
                        <div class="bowler-choice" id="bowlerChoice">-</div>
                    </div>
                    <div class="round-result" id="roundResult"></div>
                </div>

                <div class="button-group">
                    <button class="btn btn-secondary" onclick="backToMode()">Back to Mode</button>
                </div>
            </div>

            <div class="game-over" id="gameOver">
                <h2 id="gameOverTitle">Game Over!</h2>
                <p id="gameOverMessage">Congratulations!</p>
                <div>
                    <button class="btn btn-primary" onclick="startGame(gameMode)">Play Again</button>
                    <button class="btn btn-primary" onclick="backToMode()">Change Mode</button>
                </div>
            </div>
        </div>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>

    <script>
        // SOCKET.IO CONNECTION ADDED HERE
        const socket = io('http://localhost:3000');

        let gameMode = null;
        let player1Score = 0;
        let player2Score = 0;
        let currentBall = 1;
        let isBatter1Batting = true; 
        let isInningsDone = false;
        let gameOverDisplayed = false;
        let lastBatterChoice = null;
        let lastBowlerChoice = null;
        let firstInningsComplete = false;
        let targetScore = null;
        let currentSelection = 'batter';
        let timerId = null;
        let timerValue = 3;

        function startGame(mode) {
            gameMode = mode;
            player1Score = 0;
            player2Score = 0;
            currentBall = 1;
            isBatter1Batting = true;
            isInningsDone = false;
            gameOverDisplayed = false;
            lastBatterChoice = null;
            lastBowlerChoice = null;
            firstInningsComplete = false;
            targetScore = null;
            currentSelection = 'batter';

            if (mode === 'friend') {
                const roomCode = prompt("Enter a Room Code to create or join a match:");
                if (!roomCode) return; 

                document.getElementById('modeSelection').style.display = 'none';
                document.getElementById('gameScreen').classList.add('active');
                
                document.getElementById('player2Name').textContent = 'Friend';
                document.getElementById('gameTitle').textContent = `Room: ${roomCode}`;
                document.getElementById('statusInfo').textContent = 'Connecting to server...';

                socket.emit('joinRoom', roomCode);

                socket.on('waiting', (data) => {
                    document.getElementById('statusInfo').textContent = data.message;
                });

                socket.on('gameStart', (data) => {
                    document.getElementById('statusInfo').textContent = data.message;
                    updateUI();
                    resetBall();
                });

                socket.on('roomError', (data) => {
                    alert(data.message);
                    backToMode();
                });

                socket.on('opponentDisconnected', (data) => {
                    alert(data.message);
                    backToMode();
                });

            } else {
                document.getElementById('modeSelection').style.display = 'none';
                document.getElementById('gameScreen').classList.add('active');
                document.getElementById('player2Name').textContent = '🤖 Computer';
                document.getElementById('gameTitle').textContent = 'You vs Computer';
                
                updateUI();
                resetBall();
            }
        }

        function getBatterName() {
            return isBatter1Batting ? 'You' : (gameMode === 'computer' ? 'Computer' : 'Friend');
        }

        function getBowlerName() {
            return isBatter1Batting ? (gameMode === 'computer' ? 'Computer' : 'Friend') : 'You';
        }

        // SELECT RUN UPDATED FOR MULTIPLAYER
        function selectRun(runs, event) {
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(btn => btn.classList.remove('selected'));
            event.currentTarget.classList.add('selected');

            stopTimer();

            if (gameMode === 'friend') {
                document.getElementById('actionInfo').textContent = 'Waiting for opponent...';
                document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
                
                socket.emit('makeChoice', runs);
            } else {
                if (currentSelection === 'batter' && lastBatterChoice !== null) return;

                if (currentSelection === 'batter') {
                    lastBatterChoice = runs;
                    document.getElementById('batterChoice').textContent = runs;
                    document.getElementById('actionInfo').textContent = `${getBowlerName()} choose a run to bowl.`;
                    bowlerTurn();
                } else {
                    lastBowlerChoice = runs;
                    document.getElementById('bowlerChoice').textContent = runs;
                    playBall();
                }
            }
        }

        // SERVER ROUND RESULT LISTENER ADDED HERE
        socket.on('roundResult', (data) => {
            lastBatterChoice = data.p1Choice;
            lastBowlerChoice = data.p2Choice;
            
            document.getElementById('batterChoice').textContent = lastBatterChoice;
            document.getElementById('bowlerChoice').textContent = lastBowlerChoice;
            
            playBall(); 
        });

        function bowlerTurn() {
            currentSelection = 'bowler';
            document.getElementById('actionInfo').textContent = 'Computer is choosing a run...';
            document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
            startTimer();
        }

        function startTimer() {
            stopTimer();
            timerValue = 3;
            updateTimerDisplay();
            timerId = setInterval(() => {
                timerValue -= 1;
                updateTimerDisplay();
                if (timerValue <= 0) {
                    stopTimer();
                    handleTimerEnd();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        function updateTimerDisplay() {
            document.getElementById('timerInfo').textContent = `Time left: ${timerValue}s`;
        }

        function handleTimerEnd() {
            if (currentSelection === 'batter') {
                autoSelectRun();
            } else if (currentSelection === 'bowler') {
                autoSelectBowler();
            }
        }

        function autoSelectRun() {
            const run = Math.floor(Math.random() * 6) + 1;
            const button = document.querySelector(`.choices-container .choice-btn:nth-child(${run})`);
            if (button) button.classList.add('selected');
            selectRun(run, { currentTarget: button });
        }

        function autoSelectBowler() {
            const run = Math.floor(Math.random() * 6) + 1;
            lastBowlerChoice = run;
            document.getElementById('bowlerChoice').textContent = run;
            playBall();
        }

        function playBall() {
            const batterChoice = lastBatterChoice;
            const bowlerChoice = lastBowlerChoice;
            let result = '';
            let isOut = false;

            if (batterChoice === bowlerChoice) {
                result = '🔴 OUT!';
                isOut = true;
                document.getElementById('roundResult').className = 'round-result out';
            } else {
                result = `✅ ${batterChoice} Runs!`;
                if (isBatter1Batting) {
                    player1Score += batterChoice;
                } else {
                    player2Score += batterChoice;
                }
                document.getElementById('roundResult').className = 'round-result runs';
            }

            document.getElementById('roundResult').textContent = result;
            updateUI();

            if (isOut) {
                if (!firstInningsComplete) {
                    firstInningsComplete = true;
                    targetScore = isBatter1Batting ? player1Score : player2Score;
                    isBatter1Batting = !isBatter1Batting;
                    currentBall = 1;
                    currentSelection = 'batter';
                    document.getElementById('actionInfo').textContent = `${getBatterName()} starts chasing ${targetScore} target.`;
                    setTimeout(resetBall, 1200);
                } else {
                    isInningsDone = true;
                    setTimeout(endGame, 1200);
                }
            } else {
                if (firstInningsComplete) {
                    const chasingScore = isBatter1Batting ? player1Score : player2Score;
                    if (chasingScore > targetScore) {
                        isInningsDone = true;
                        setTimeout(endGame, 800);
                        return;
                    }
                }
                currentBall++;
                currentSelection = 'batter';
                setTimeout(resetBall, 1200);
            }
        }

        function resetBall() {
            stopTimer();
            lastBatterChoice = null;
            lastBowlerChoice = null;
            document.getElementById('batterChoice').textContent = '-';
            document.getElementById('bowlerChoice').textContent = '-';
            document.getElementById('roundResult').textContent = '';

            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(btn => {
                btn.classList.remove('selected');
                btn.disabled = false;
            });

            currentSelection = 'batter';
            document.getElementById('actionInfo').textContent = `${getBatterName()} is batting. Choose a run.`;
            updateUI();
            
            // Only start timer if game is currently playing
            if (!isInningsDone && !gameOverDisplayed) {
                 startTimer();
            }
        }

        function updateUI() {
            document.getElementById('player1Score').textContent = player1Score;
            document.getElementById('player2Score').textContent = player2Score;

            document.getElementById('player1Card').classList.toggle('active', isBatter1Batting);
            document.getElementById('player2Card').classList.toggle('active', !isBatter1Batting);

            if (isBatter1Batting) {
                document.getElementById('player1Role').textContent = '🏏 Batter';
                document.getElementById('player2Role').textContent = '🎯 Bowler';
            } else {
                document.getElementById('player1Role').textContent = '🎯 Bowler';
                document.getElementById('player2Role').textContent = '🏏 Batter';
            }

            if (!isInningsDone) {
                let status = `Ball ${currentBall}`;
                if (firstInningsComplete && targetScore !== null) {
                    status += ` • Target ${targetScore}`;
                }
                document.getElementById('statusInfo').textContent = status;
            }
        }

        function endGame() {
            if (gameOverDisplayed) return;
            gameOverDisplayed = true;
            stopTimer();

            let winner = '';
            let message = '';

            if (player1Score > player2Score) {
                winner = 'You Win! 🎉';
                message = `Final Score: You ${player1Score} - ${player2Score} ${gameMode === 'computer' ? 'Computer' : 'Friend'}`;
            } else if (player2Score > player1Score) {
                winner = `${gameMode === 'computer' ? 'Computer' : 'Friend'} Wins! 🎉`;
                message = `Final Score: You ${player1Score} - ${player2Score} ${gameMode === 'computer' ? 'Computer' : 'Friend'}`;
            } else {
                winner = "It's a Tie! 🤝";
                message = `Final Score: ${player1Score} - ${player2Score}`;
            }

            document.getElementById('gameOverTitle').textContent = winner;
            document.getElementById('gameOverMessage').textContent = message;
            document.getElementById('gameOver').classList.add('active');
        }

        function backToMode() {
            stopTimer();
            if (gameMode === 'friend' && socket) {
                socket.emit('leaveRoom'); // optional cleanup
            }
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('gameOver').classList.remove('active');
            document.getElementById('modeSelection').style.display = 'block';
        }
    </script>
</body>
</html>
